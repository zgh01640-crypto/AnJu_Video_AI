server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 所有路由回退到 index.html（SPA 支持）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
